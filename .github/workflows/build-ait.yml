name: Build umbrella.ait

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/umbrella/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/umbrella
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/umbrella/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build .ait
        run: npm run build

      - name: Upload umbrella.ait artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbrella-ait
          path: apps/umbrella/*.ait
          if-no-files-found: error
